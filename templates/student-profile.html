{% extends "base.html" %}
{% load static %}
{% block pageTitle %}Profile{% endblock pageTitle %}
{% block content %}

<div class="dashboard-content" style="max-width: 800px;">
  <div class="dashboard-welcome">
    <h1>My Profile</h1>
    <p>Manage your personal information</p>
  </div>

  <div class="dashboard-card fade-in visible">
    <form id="profileForm" onsubmit="saveProfile(event)" method="POST">
      {% csrf_token %}

      <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem;">
        <div class="form-group">
          <label class="form-label">First Name</label>
          <input type="text" name="first_name" class="form-input" value="{{ request.user.first_name }}" required>
        </div>
        <div class="form-group">
          <label class="form-label">Last Name</label>
          <input type="text" name="last_name" class="form-input" value="{{ request.user.last_name }}" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" value="{{ request.user.email }}" readonly
               style="opacity: 0.6; cursor: not-allowed;" title="Email cannot be changed">
      </div>

      <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem;">
        <div class="form-group">
          <label class="form-label">Graduation Year</label>
          <input type="number" name="graduation_year" class="form-input" value="{{ request.user.graduation_year }}" min="2024" max="2035">
        </div>
        <div class="form-group">
          <label class="form-label">Date of Birth</label>
          <input type="date" name="dob" class="form-input" value="{{ request.user.date_of_birth|date:'Y-m-d' }}">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Major / Field of Study</label>
        <select name="field_of_study" class="form-select">
          <option value="" disabled>Select Major</option>
          {% for major in majors %}
          <option value="{{ major.pk }}" {% if request.user.major == major %}selected{% endif %}>{{ major }}</option>
          {% endfor %}
        </select>
      </div>

      <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem;">
        <div class="form-group">
          <label class="form-label">Gender</label>
          <select name="gender" class="form-select">
            <option value="M" {% if request.user.gender == "M" %}selected{% endif %}>Male</option>
            <option value="F" {% if request.user.gender == "F" %}selected{% endif %}>Female</option>
            <option value="O" {% if request.user.gender == "O" %}selected{% endif %}>Other</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Nationality</label>
          <select name="nationality" class="form-select">
            <option value="" disabled>Select Nationality</option>
            {% for code, name in nationalities %}
            <option value="{{ code }}" {% if request.user.nationality.code == code %}selected{% endif %}>{{ name }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div style="display: flex; gap: 1rem; margin-top: 2rem;">
        <button type="submit" class="btn" style="flex: 1;">
          <span>Save Changes</span>
          <div class="btn-glow"></div>
        </button>
        <a href="{% url 'website:student_dashboard' %}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
